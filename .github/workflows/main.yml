      - name: Harvest patch and build inputs
        shell: bash
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE"

          mkdir -p out/core
          mkdir -p out/meta
          mkdir -p out/unpacked
          mkdir -p out/unpacked/lz4

          # Unpack nested archives
          while IFS= read -r -d '' arc; do
            rel="${arc#./}"
            safe="$(echo "$rel" | sed 's#[/ ]#_#g')"
            dest="out/unpacked/${safe}"
            mkdir -p "$dest"

            case "${arc,,}" in
              *.zip)
                unzip -oq "$arc" -d "$dest" || true
                ;;
              *.7z|*.rar|*.tar|*.tgz|*.tar.gz|*.md5)
                7z x -y "-o$dest" "$arc" || true
                ;;
            esac
          done < <(
            find . \
              -path './.git' -prune -o \
              -path './out' -prune -o \
              -type f \
              \( -iname '*.zip' -o -iname '*.7z' -o -iname '*.rar' -o -iname '*.tar' -o -iname '*.tgz' -o -iname '*.tar.gz' -o -iname '*.md5' \) \
              ! -name 'firmware.zip' \
              -print0
          )

          # Decompress .lz4 payloads if present
          while IFS= read -r -d '' f; do
            rel="${f#./}"
            safe="$(echo "$rel" | sed 's#[/ ]#_#g' | sed 's#\.lz4$##')"
            out_file="out/unpacked/lz4/${safe}"
            lz4 -d -f "$f" "$out_file" || true
          done < <(
            find . out/unpacked \
              -path './.git' -prune -o \
              -type f -iname '*.lz4' -print0
          )

          : > out/meta/found-core.txt
          : > out/meta/core-map.txt
          : > out/meta/skipped-duplicates.txt

          copy_core() {
            local f="$1"
            local rel="${f#./}"
            local b lb dst

            b="$(basename "$f")"
            lb="$(echo "$b" | tr '[:upper:]' '[:lower:]')"

            case "$lb" in
              boot.img|recovery.img|vendor_boot.img|init_boot.img|dtbo.img|\
              vbmeta.img|vbmeta_system.img|vbmeta_vendor.img|vbmeta_*.img|\
              *scatter*.txt|mt*.txt|rawprogram*.xml|flash*.xml)
                dst="out/core/$b"
                if [ ! -e "$dst" ]; then
                  cp -f "$f" "$dst" || true
                  echo "$b <- $rel" >> out/meta/core-map.txt
                else
                  echo "$b duplicate from $rel" >> out/meta/skipped-duplicates.txt
                fi
                echo "$rel" >> out/meta/found-core.txt
                ;;
            esac
          }

          while IFS= read -r -d '' f; do
            copy_core "$f"
          done < <(
            find . out/unpacked out/unpacked/lz4 \
              -path './.git' -prune -o \
              -type f -print0
          )

          sort -u out/meta/found-core.txt -o out/meta/found-core.txt || true
          sort -u out/meta/core-map.txt -o out/meta/core-map.txt || true
          sort -u out/meta/skipped-duplicates.txt -o out/meta/skipped-duplicates.txt || true

          {
            echo "=== CORE FILES ==="
            ls -lah out/core || true
            echo
            echo "=== CORE MAP ==="
            cat out/meta/core-map.txt || true
            echo
            echo "=== FOUND CORE PATHS ==="
            cat out/meta/found-core.txt || true
            echo
            echo "=== DUPLICATES ==="
            cat out/meta/skipped-duplicates.txt || true
          } | tee out/meta/summary.txt

      - name: Show summary on Actions page
        shell: bash
        run: |
          {
            echo "## Lenovo firmware core patch inputs"
            echo
            echo '```text'
            cat out/meta/summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload tiny report only
        uses: actions/upload-artifact@v6
        with:
          name: patch-report
          path: out/meta
          if-no-files-found: error
          retention-days: 3
          compression-level: 9
