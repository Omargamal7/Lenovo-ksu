name: Extract Lenovo firmware and harvest patch inputs

on:
  workflow_dispatch:
    inputs:
      firmware_url:
        description: Direct firmware ZIP URL
        required: true
        type: string
        default: https://mirrors-obs-1.lolinet.com/firmware/lenowow/2020/Tab_M10_FHD_Plus_2nd_Gen/TB-X606X/TB-X606X_S300673_220613_BMP.zip

permissions:
  contents: read

jobs:
  extract-fw:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install extraction tools
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            unzip \
            p7zip-full \
            lz4 \
            android-sdk-libsparse-utils \
            file

      - name: Show workspace and free space
        shell: bash
        run: |
          set -euxo pipefail
          echo "Workspace: $GITHUB_WORKSPACE"
          df -h "$GITHUB_WORKSPACE"

      - name: Download firmware ZIP to repo root
        shell: bash
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE"

          curl -L --fail --retry 5 --retry-delay 5 \
            -o firmware.zip \
            "${{ inputs.firmware_url }}"

          ls -lh firmware.zip
          unzip -tq firmware.zip

      - name: Extract firmware ZIP into repo root
        shell: bash
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE"
          unzip -q firmware.zip

      - name: Harvest patch/build inputs
        shell: bash
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE"

          mkdir -p out/patch-inputs
          mkdir -p out/meta
          mkdir -p out/unpacked

          # Unpack nested archives
          while IFS= read -r -d '' arc; do
            rel="${arc#./}"
            safe="$(echo "$rel" | sed 's#[/ ]#_#g')"
            dest="out/unpacked/${safe}"
            mkdir -p "$dest"

            case "${arc,,}" in
              *.zip)
                unzip -oq "$arc" -d "$dest" || true
                ;;
              *.7z|*.rar|*.tar|*.tgz|*.tar.gz|*.md5)
                7z x -y "-o$dest" "$arc" || true
                ;;
            esac
          done < <(
            find . \
              -path './.git' -prune -o \
              -path './out' -prune -o \
              -type f \
              \( -iname '*.zip' -o -iname '*.7z' -o -iname '*.rar' -o -iname '*.tar' -o -iname '*.tgz' -o -iname '*.tar.gz' -o -iname '*.md5' \) \
              ! -name 'firmware.zip' \
              -print0
          )

          : > out/meta/found-files.txt

          copy_match() {
            local f="$1"
            local b
            b="$(basename "$f")"
            lb="$(echo "$b" | tr '[:upper:]' '[:lower:]')"

            case "$lb" in
              boot.img|recovery.img|vendor_boot.img|init_boot.img|dtbo.img|super.img|payload.bin|vbmeta.img|vbmeta_*.img|vbmeta_system.img|vbmeta_vendor.img|dtb.img|dtb.bin|lk.bin|logo.bin|preloader*.bin|*scatter*.txt|mt*.txt|rawprogram*.xml|flash*.xml)
                cp -f "$f" "out/patch-inputs/$b" || true
                echo "$f" >> out/meta/found-files.txt
                ;;
            esac
          }

          while IFS= read -r -d '' f; do
            copy_match "$f"
          done < <(
            find . out/unpacked \
              -path './.git' -prune -o \
              -type f -print0
          )

          sort -u out/meta/found-files.txt -o out/meta/found-files.txt

          : > out/meta/sparse-converted.txt
          shopt -s nullglob
          for img in out/patch-inputs/*.img; do
            if file "$img" | grep -qi 'Android sparse image'; then
              raw="${img%.img}.raw.img"
              simg2img "$img" "$raw" || true
              if [ -f "$raw" ]; then
                echo "$(basename "$img") -> $(basename "$raw")" >> out/meta/sparse-converted.txt
              fi
            fi
          done

          {
            echo "=== PATCH INPUTS ==="
            ls -lah out/patch-inputs || true
            echo
            echo "=== FOUND FILES ==="
            cat out/meta/found-files.txt || true
            echo
            echo "=== SPARSE CONVERSIONS ==="
            cat out/meta/sparse-converted.txt || true
          } | tee out/meta/summary.txt

      - name: Upload extracted patch inputs
        uses: actions/upload-artifact@v4
        with:
          name: patch-inputs
          path: |
            out/patch-inputs
            out/meta
          if-no-files-found: error
          retention-days: 7
