name: Extract Lenovo firmware and harvest patch inputs

on:
  workflow_dispatch:
    inputs:
      firmware_url:
        description: Direct firmware ZIP URL
        required: true
        type: string
        default: https://mirrors-obs-1.lolinet.com/firmware/lenowow/2020/Tab_M10_FHD_Plus_2nd_Gen/TB-X606X/TB-X606X_S300673_220613_BMP.zip

permissions:
  contents: read

jobs:
  extract-fw:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install extraction tools
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            unzip \
            p7zip-full \
            lz4 \
            android-sdk-libsparse-utils \
            file

      - name: Show workspace and free space
        shell: bash
        run: |
          set -euxo pipefail
          echo "Workspace: $GITHUB_WORKSPACE"
          df -h "$GITHUB_WORKSPACE"

      - name: Download firmware ZIP to repo root
        shell: bash
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE"

          curl -L --fail --retry 5 --retry-delay 5 \
            -o firmware.zip \
            "${{ inputs.firmware_url }}"

          ls -lh firmware.zip
          unzip -tq firmware.zip

      - name: Extract firmware ZIP into repo root
        shell: bash
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE"
          unzip -q firmware.zip

      - name: Harvest patch and build inputs
        shell: bash
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE"

          mkdir -p out/patch-inputs/by-name
          mkdir -p out/patch-inputs/by-path
          mkdir -p out/meta
          mkdir -p out/unpacked
          mkdir -p out/unpacked/lz4

          # 1) Unpack nested archives found after root extraction
          while IFS= read -r -d '' arc; do
            rel="${arc#./}"
            safe="$(echo "$rel" | sed 's#[/ ]#_#g')"
            dest="out/unpacked/${safe}"
            mkdir -p "$dest"

            case "${arc,,}" in
              *.zip)
                unzip -oq "$arc" -d "$dest" || true
                ;;
              *.7z|*.rar|*.tar|*.tgz|*.tar.gz|*.md5)
                7z x -y "-o$dest" "$arc" || true
                ;;
            esac
          done < <(
            find . \
              -path './.git' -prune -o \
              -path './out' -prune -o \
              -type f \
              \( -iname '*.zip' -o -iname '*.7z' -o -iname '*.rar' -o -iname '*.tar' -o -iname '*.tgz' -o -iname '*.tar.gz' -o -iname '*.md5' \) \
              ! -name 'firmware.zip' \
              -print0
          )

          # 2) Decompress any .img.lz4 files we find
          while IFS= read -r -d '' f; do
            rel="${f#./}"
            safe="$(echo "$rel" | sed 's#[/ ]#_#g' | sed 's#\.lz4$##')"
            out_file="out/unpacked/lz4/${safe}"
            lz4 -d -f "$f" "$out_file" || true
          done < <(
            find . out/unpacked \
              -path './.git' -prune -o \
              -type f -iname '*.lz4' -print0
          )

          : > out/meta/found-files.txt
          : > out/meta/by-name-map.txt
          : > out/meta/skipped-duplicates.txt

          store_match() {
            local f="$1"
            local rel="${f#./}"
            local b lb safe dest_by_path dest_by_name

            b="$(basename "$f")"
            lb="$(echo "$b" | tr '[:upper:]' '[:lower:]')"
            safe="$(echo "$rel" | sed 's#[/ ]#_#g')"

            case "$lb" in
              boot.img|recovery.img|vendor_boot.img|init_boot.img|dtbo.img|super.img|payload.bin|\
              vbmeta.img|vbmeta_*.img|vbmeta_system.img|vbmeta_vendor.img|\
              system.img|vendor.img|product.img|odm.img|system_ext.img|vendor_dlkm.img|metadata.img|\
              dtb.img|dtb.bin|lk.bin|logo.bin|preloader*.bin|\
              *scatter*.txt|mt*.txt|rawprogram*.xml|flash*.xml|vendor_boot-debug.img)
                dest_by_path="out/patch-inputs/by-path/${safe}"
                cp -f "$f" "$dest_by_path" || true
                echo "$rel" >> out/meta/found-files.txt

                dest_by_name="out/patch-inputs/by-name/$b"
                if [ ! -e "$dest_by_name" ]; then
                  cp -f "$f" "$dest_by_name" || true
                  echo "$b <- $rel" >> out/meta/by-name-map.txt
                else
                  echo "$b duplicate from $rel" >> out/meta/skipped-duplicates.txt
                fi
                ;;
            esac
          }

          # 3) Scan everything extracted/unpacked/decompressed
          while IFS= read -r -d '' f; do
            store_match "$f"
          done < <(
            find . out/unpacked out/unpacked/lz4 \
              -path './.git' -prune -o \
              -type f -print0
          )

          sort -u out/meta/found-files.txt -o out/meta/found-files.txt
          sort -u out/meta/by-name-map.txt -o out/meta/by-name-map.txt || true
          sort -u out/meta/skipped-duplicates.txt -o out/meta/skipped-duplicates.txt || true

          # 4) Convert sparse images to raw when safe/useful
          : > out/meta/sparse-converted.txt
          shopt -s nullglob
          for img in out/patch-inputs/by-name/*.img; do
            base="$(basename "$img")"

            case "$base" in
              super.img)
                echo "Skipped sparse conversion for $base" >> out/meta/sparse-converted.txt
                continue
                ;;
            esac

            if file "$img" | grep -qi 'Android sparse image'; then
              raw="${img%.img}.raw.img"
              simg2img "$img" "$raw" || true
              if [ -f "$raw" ]; then
                echo "$base -> $(basename "$raw")" >> out/meta/sparse-converted.txt
              fi
            fi
          done

          # 5) Summary
          {
            echo "=== BY-NAME PATCH INPUTS ==="
            ls -lah out/patch-inputs/by-name || true
            echo
            echo "=== FOUND FILES ==="
            cat out/meta/found-files.txt || true
            echo
            echo "=== BY-NAME MAP ==="
            cat out/meta/by-name-map.txt || true
            echo
            echo "=== DUPLICATES SKIPPED FOR BY-NAME ==="
            cat out/meta/skipped-duplicates.txt || true
            echo
            echo "=== SPARSE CONVERSIONS ==="
            cat out/meta/sparse-converted.txt || true
          } | tee out/meta/summary.txt

      - name: Upload extracted patch inputs
        uses: actions/upload-artifact@v6
        with:
          name: patch-inputs
          path: |
            out/patch-inputs
            out/meta
          if-no-files-found: error
          retention-days: 7
