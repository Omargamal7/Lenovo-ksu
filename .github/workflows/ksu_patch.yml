name: Patch Boot with KernelSU Next

on:
  workflow_dispatch:
  push:
    paths:
      - 'ksu/trigger_patch'

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download firmware and extract boot.img
        run: |
          curl -L -o firmware.zip "https://mirrors-obs-1.lolinet.com/firmware/lenowow/2020/Tab_M10_FHD_Plus_2nd_Gen/TB-X606X/TB-X606X_S300673_220613_BMP.zip"
          unzip -p firmware.zip boot.img > boot.img || true
          if [ ! -s boot.img ]; then
            unzip firmware.zip
            find . -name "boot.img" -exec mv {} boot.img \;
          fi

      - name: Setup MagiskBoot and KSU Next
        run: |
          # Download magiskboot
          curl -L -o magiskboot.zip "https://github.com/mzyy94/magiskboot-ndk-bin/releases/download/v26.1/magiskboot-x86_64.zip"
          unzip magiskboot.zip

          # Download latest KernelSU Next Manager/Binaries (generic)
          # Note: Real patching usually requires a ksu-ready kernel. 
          # This step prepares the environment for manual or automated patching.
          echo "Preparing for KSU Next integration..."

      - name: Patching Logic
        run: |
          # Basic magiskboot unpack to verify integrity
          chmod +x magiskboot
          ./magiskboot unpack boot.img
          
          # This is where we would integrate the KSU Next kernel if we had the prebuilt
          # or use an automated patcher. For now, we verify we can manipulate the image.
          echo "Unpacked boot.img successfully."
          
          ./magiskboot repack boot.img ksu_boot.img

      - name: Upload Patched Image
        uses: actions/upload-artifact@v4
        with:
          name: ksu_patched_boot
          path: ksu_boot.img
