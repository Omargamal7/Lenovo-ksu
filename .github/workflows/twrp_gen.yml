name: Generate TWRP Device Tree

on:
  workflow_dispatch:
  push:
    paths:
      - 'twrp/trigger_gen'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip cpio
          pip3 install twrpdtgen

      - name: Download recovery image from previous run
        run: |
          # We'll use the URL from the previous successful run to get recovery.img
          # For this initial automated run, we'll download it directly
          curl -L -o recovery.img "https://mirrors-obs-1.lolinet.com/firmware/lenowow/2020/Tab_M10_FHD_Plus_2nd_Gen/TB-X606X/TB-X606X_S300673_220613_BMP.zip"
          unzip -p recovery.img recovery.img > recovery_extracted.img || true
          if [ ! -s recovery_extracted.img ]; then
            # If nested, try to find it
            unzip recovery.img
            find . -name "recovery.img" -exec mv {} recovery_extracted.img \;
          fi

      - name: Generate Device Tree
        run: |
          python3 -m twrpdtgen recovery_extracted.img --output output/

      - name: Upload Device Tree
        uses: actions/upload-artifact@v4
        with:
          name: twrp_device_tree
          path: output/
