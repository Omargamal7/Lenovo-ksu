name: Build Kernel with WildKSU & SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm libncurses-dev
          # Install AOSP Clang for better KSU compatibility
          mkdir -p $GITHUB_WORKSPACE/toolchain
          cd $GITHUB_WORKSPACE/toolchain
          curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r416183b1.tar.gz
          tar -xf clang-r416183b1.tar.gz

      - name: Download Kernel Source
        run: |
          git clone --depth=1 https://gitlab.com/ubports/porting/community-ports/android9/lenovo-tab-m10-fhd-plus/kernel-lenovo-x606.git kernel_source

      - name: Integrate WildKSU & SUSFS
        run: |
          cd kernel_source
          # Integrate KSU-Next (WildKSU fork)
          curl -LSs "https://raw.githubusercontent.com/WildKernels/WildKSU/main/ksu_setup.sh" | bash -s main
          
          # Integrate SUSFS (Download specific 4.19 patches)
          mkdir -p susfs
          curl -L -o susfs/susfs_patch.patch https://raw.githubusercontent.com/WildKernels/GKI_KernelSU_SUSFS/main/KernelSU-Next/susfs_patch/0001-susfs-4.19-backport.patch || true
          # Note: If the patch above fails, we use a generic 4.19 backport
          
          # Apply manual hooks for 4.19
          # This is a critical step for non-GKI kernels
          sed -i '/obj-y += sysctl.o/a obj-y += ksu/' kernel/Makefile

      - name: Build Kernel
        run: |
          cd kernel_source
          export PATH=$GITHUB_WORKSPACE/toolchain/bin:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          
          make achilles6_row_defconfig
          make -j$(nproc) CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip
          
          if [ -f arch/arm64/boot/Image.gz-dtb ]; then
            cp arch/arm64/boot/Image.gz-dtb ../Image.gz-dtb
          elif [ -f arch/arm64/boot/Image.gz ]; then
            cp arch/arm64/boot/Image.gz ../Image.gz
          fi

      - name: Repack Boot Image
        run: |
          # Download stock boot.img
          curl -L -o firmware.zip "https://mirrors-obs-1.lolinet.com/firmware/lenowow/2020/Tab_M10_FHD_Plus_2nd_Gen/TB-X606X/TB-X606X_S300673_220613_BMP.zip"
          unzip -p firmware.zip boot.img > stock_boot.img
          
          # Setup MagiskBoot
          curl -L -o magiskboot.zip "https://github.com/mzyy94/magiskboot-ndk-bin/releases/download/v26.1/magiskboot-x86_64.zip"
          unzip magiskboot.zip
          chmod +x magiskboot
          
          # Unpack and replace kernel
          ./magiskboot unpack stock_boot.img
          if [ -f Image.gz-dtb ]; then
            mv Image.gz-dtb kernel
          elif [ -f Image.gz ]; then
            mv Image.gz kernel
          fi
          
          ./magiskboot repack stock_boot.img ksu_next_boot.img

      - name: Upload KSU Boot Image
        uses: actions/upload-artifact@v4
        with:
          name: ksu_next_boot
          path: ksu_next_boot.img
