name: Build Kernel with WildKSU & SUSFS

on:
  workflow_dispatch:
  push:
    paths:
      - 'ksu/trigger_kernel_build'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libncurses-dev

      - name: Download Kernel Source
        run: |
          git clone --depth=1 https://gitlab.com/ubports/porting/community-ports/android9/lenovo-tab-m10-fhd-plus/kernel-lenovo-x606.git kernel_source

      - name: Integrate KernelSU-Next & SUSFS
        run: |
          cd kernel_source
          
          # 1. Integrate KernelSU-Next (rifsxd fork - stable for 4.19)
          git clone --depth=1 https://github.com/rifsxd/KernelSU-Next ksu
          
          # 2. Integrate SUSFS Patches
          git clone --depth=1 https://github.com/Star-Seven/susfs4ksu susfs_repo
          
          # Apply SUSFS for KSU
          cd ksu
          patch -p1 < ../susfs_repo/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch || echo "KSU SUSFS patch failed"
          cd ..
          
          # Apply SUSFS for Kernel 4.19
          patch -p1 < susfs_repo/kernel_patches/50_add_susfs_in_kernel-4.19.patch || echo "Kernel 4.19 SUSFS patch failed"
          
          # Copy SUSFS files to kernel tree
          cp susfs_repo/kernel_patches/fs/susfs.c fs/
          cp susfs_repo/kernel_patches/include/linux/susfs.h include/linux/
          
          # 3. Apply manual hooks for 4.19
          if [ -d "ksu" ]; then
            echo "Integrating KSU into kernel build system..."
            if [ -f "kernel/Makefile" ]; then
              sed -i '/obj-y += sysctl.o/a obj-y += ksu/' kernel/Makefile
            else
              sed -i '/obj-y += sched\//a obj-y += ksu/' Makefile || true
            fi
          fi
          
          # Enable SUSFS in defconfig
          echo "CONFIG_KSU=y" >> arch/arm64/configs/achilles6_row_defconfig
          echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/achilles6_row_defconfig

      - name: Build Kernel
        run: |
          cd kernel_source
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          # Fix for missing dtbo_check
          sed -i 's/dtbo_check//g' Makefile || true
          sed -i 's/dtbo_check//g' arch/arm64/Makefile || true
          
          # Forward declaration to fix implicit declaration error
          sed -i '/#include .*sched.h.*/a extern int find_best_idle_cpu(struct task_struct *p, bool prefer_idle);' kernel/sched/eas_plus.c || true

          make achilles6_row_defconfig

          # Building with GCC flags per user steering
          make -j$(nproc) CROSS_COMPILE=aarch64-linux-gnu- \
            HOSTCFLAGS="-fcommon -Wno-error" \
            HOSTCXXFLAGS="-fcommon -Wno-error" \
            KCFLAGS="-Wno-error \
              -Wno-error=implicit-function-declaration \
              -Wno-error=implicit-int \
              -Wno-error=incompatible-pointer-types \
              -Wno-error=int-conversion \
              -Wno-error=array-bounds \
              -Wno-error=array-compare \
              -Wno-error=dangling-pointer" \
            KCPPFLAGS="-Wno-error" \
            Image.gz-dtb || { \
              rc=$?; \
              set +e; \
              echo "Build failed. Diagnostic Deep Dive:"; \
              echo "--- find_best_idle_cpu ---"; \
              git grep -n 'find_best_idle_cpu' || grep -rn 'find_best_idle_cpu' kernel include drivers arch || true; \
              echo "--- NOHZ_BALANCE_KICK ---"; \
              git grep -n 'NOHZ_BALANCE_KICK' || grep -rn 'NOHZ_BALANCE_KICK' kernel include drivers arch || true; \
              echo "--- diff ---"; \
              git diff -- kernel/sched include/linux/sched arch/arm64/configs/achilles6_row_defconfig || true; \
              exit $rc; \
            }
          
          if [ -f arch/arm64/boot/Image.gz-dtb ]; then
            cp arch/arm64/boot/Image.gz-dtb ../Image.gz-dtb
          elif [ -f arch/arm64/boot/Image.gz ]; then
            cp arch/arm64/boot/Image.gz ../Image.gz
          elif [ -f arch/arm64/boot/Image ]; then
             cp arch/arm64/boot/Image ../Image
          fi

      - name: Repack Boot Image
        run: |
          # Download stock boot.img
          curl -L -o firmware.zip "https://mirrors-obs-1.lolinet.com/firmware/lenowow/2020/Tab_M10_FHD_Plus_2nd_Gen/TB-X606X/TB-X606X_S300673_220613_BMP.zip"
          unzip -p firmware.zip boot.img > stock_boot.img
          
          # Setup MagiskBoot
          curl -L -o magiskboot.zip "https://github.com/mzyy94/magiskboot-ndk-bin/releases/download/v26.1/magiskboot-x86_64.zip"
          unzip magiskboot.zip
          chmod +x magiskboot
          
          # Unpack and replace kernel
          ./magiskboot unpack stock_boot.img
          if [ -f Image.gz-dtb ]; then
            mv Image.gz-dtb kernel
          elif [ -f Image.gz ]; then
            mv Image.gz kernel
          fi
          
          ./magiskboot repack stock_boot.img ksu_next_boot.img

      - name: Upload KSU Boot Image
        uses: actions/upload-artifact@v4
        with:
          name: ksu_next_boot
          path: ksu_next_boot.img
