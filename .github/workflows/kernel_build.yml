name: Build Kernel with WildKSU & SUSFS

on:
  workflow_dispatch:
  push:
    paths:
      - 'ksu/trigger_kernel_build'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang-15 lld-15 llvm-15 libncurses-dev
          # Using Clang-15 as it is more stable for 4.19 kernels
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-15 100
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-15 100

      - name: Download Kernel Source
        run: |
          git clone --depth=1 https://gitlab.com/ubports/porting/community-ports/android9/lenovo-tab-m10-fhd-plus/kernel-lenovo-x606.git kernel_source

      - name: Integrate WildKSU & SUSFS
        run: |
          cd kernel_source
          
          # 1. Integrate WildKSU directly
          git clone --depth=1 https://github.com/WildKernels/WildKSU ksu
          
          # 2. Integrate SUSFS (Optional but recommended)
          mkdir -p susfs
          # We'll use a safer download for the patch
          curl -LSs https://raw.githubusercontent.com/WildKernels/GKI_KernelSU_SUSFS/main/KernelSU-Next/susfs_patch/0001-susfs-4.19-backport.patch -o susfs/susfs.patch || echo "SUSFS patch not found"
          
          # 3. Apply manual hooks for 4.19
          # This ensures the ksu directory is compiled
          if [ -d "ksu" ]; then
            echo "Integrating KSU into kernel build system..."
            # Check if kernel/Makefile exists
            if [ -f "kernel/Makefile" ]; then
              sed -i '/obj-y += sysctl.o/a obj-y += ksu/' kernel/Makefile
            else
              # Fallback for some MediaTek trees
              sed -i '/obj-y += sched\//a obj-y += ksu/' Makefile || true
            fi
          fi

      - name: Build Kernel
        run: |
          cd kernel_source
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          make achilles6_row_defconfig
          # Building with Clang and LLVM tools
          make -j$(nproc) CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip
          
          if [ -f arch/arm64/boot/Image.gz-dtb ]; then
            cp arch/arm64/boot/Image.gz-dtb ../Image.gz-dtb
          elif [ -f arch/arm64/boot/Image.gz ]; then
            cp arch/arm64/boot/Image.gz ../Image.gz
          elif [ -f arch/arm64/boot/Image ]; then
             cp arch/arm64/boot/Image ../Image
          fi

      - name: Repack Boot Image
        run: |
          # Download stock boot.img
          curl -L -o firmware.zip "https://mirrors-obs-1.lolinet.com/firmware/lenowow/2020/Tab_M10_FHD_Plus_2nd_Gen/TB-X606X/TB-X606X_S300673_220613_BMP.zip"
          unzip -p firmware.zip boot.img > stock_boot.img
          
          # Setup MagiskBoot
          curl -L -o magiskboot.zip "https://github.com/mzyy94/magiskboot-ndk-bin/releases/download/v26.1/magiskboot-x86_64.zip"
          unzip magiskboot.zip
          chmod +x magiskboot
          
          # Unpack and replace kernel
          ./magiskboot unpack stock_boot.img
          if [ -f Image.gz-dtb ]; then
            mv Image.gz-dtb kernel
          elif [ -f Image.gz ]; then
            mv Image.gz kernel
          fi
          
          ./magiskboot repack stock_boot.img ksu_next_boot.img

      - name: Upload KSU Boot Image
        uses: actions/upload-artifact@v4
        with:
          name: ksu_next_boot
          path: ksu_next_boot.img
